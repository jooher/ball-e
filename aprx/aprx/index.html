<!doctype html>

<head>
	<title>Approximation</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<style>
	svg{
		background:whitesmoke;
		width:1000px;
		height:500px;
	}
	polyline{
		vector-effect:non-scaling-stroke;
	}
	</style>
</head>

<svg viewBox="0 0 1.2 150" preserveAspectRatio="none" transform="scale(1,-1)" >

	<polyline id=orig fill=none stroke=gray />
	<polyline id=aprx fill=none stroke=blue />
	
</svg>

<script type=module >

import {PLOT,ORIG,APRX,bounds} from './deriv.js';

function* rangefn(fn,{a,b,d}) {
  for(let x=a; x <= b; x +=d)
	yield x.toFixed(1)+' '+fn(x).toFixed(1); //`${x},${4*fn(x)}`;
}


orig.setAttribute('points', PLOT || [...rangefn(ORIG,bounds)].join("\n"));
aprx.setAttribute('points', [...rangefn(APRX,bounds)].join("\n"));
