<!doctype html>

<head>
	<title>Appro2D</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<style>
	
	svg{
		background:whitesmoke;
		width: 100%;
		height:500px;
		transform: scale(1,-1);
	}
	
	polyline{
		vector-effect:non-scaling-stroke;
		stroke:inherit;
		fill:none;
	}
	
	#svg	{stroke:gray}
	
	#axis0 {transform:scale(2000,1);stroke:blue}
	#aprx0 {transform:scale(2000,1);stroke: slateblue}
	
	#axis1 {transform:scale(1000,1); stroke:green}
	#aprx1 {transform:scale(1000,1); stroke:purple}
	#cnfd	{transform:scale(1000,1); stroke:lightgray}
	
	#result {transform:scale(1000,1); stroke:orange; }
	
	</style>
</head>

<svg id=svg viewBox="0 0 1500 20" preserveAspectRatio="none" >

	<polyline points='0,0 1,0' />

	<g id=axis0 ></g>
	<g id=aprx0 ></g>
	
	<g id=axis1 ></g>
	<g id=aprx1 ></g>
	<g id=cnfd ></g>
	
	<g id=result ></g>
	
</svg>

<script type=module >

import data from './data/bcvm1000d.js';
import model from './models/bcvm.js';

const

q = s => document.querySelector(s),
flock = (g,lines,fn) => { fn ? g.append(...lines.map(fn)) : g.append(...lines) },

polyline = points => {
	const p = q("#svg>polyline").cloneNode(false);
	p.setAttribute("points",points.map( ({x,y}) => `${x},${y.toFixed(2)}`).join(' '));
	return p;
},

raw = axis => line => polyline(line.map( (value,j)=>({x:axis[j],y:value}) )),

confined = (axis,kY) => line => {
	const k=kY/(line[0]); //-o
	return polyline(line.map( (value,j) => ({x:axis[j],y:(value)*k}) )); //-o
},

aprx = (axis,calc) => axis.map( x=> ({x,y:calc(x)}) ),
range = (from,to,length) => Array.from({length}).map((n,i)=>from+i*(to-from)/length),


{axes,fit,vals} = data,
[bcx,vmx] = axes,
[bca,vma] = axes.map( axis => range(axis.at(0),axis.at(-1),20) ),

Vref = vals[fit[0]][fit[1]],
K = Vref / model( axes[0][fit[0]], axes[1][fit[1]])
;

console.log(K);

flock(q("#axis1"),vals,raw(vmx));//
//q("#aprx1").append( polyline(aprx( vma, model )));

/*
//flock(q("#cnfd"),map,confined(vmx,max));


q("#axis0").append(polyline(map.map((line,i)=>({x:bcx[i],y:line[fit[0]]}))));
q("#aprx0").append(polyline(aprx(bca,calcbc)));
*/
flock(q("#result"),
	bcx.map( bc => polyline( vma.map( vm => ({ x:vm ,y:K*model(bc,vm) })) ) )
);
/**/
</script>
