<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Идеальная монотонная аппроксимация</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        svg { background: #fafafa; border: 1px solid #ddd; margin-top: 10px; }
        .legend { display: flex; gap: 20px; margin-top: 10px; font-size: 14px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot-ref { width: 10px; height: 10px; background: #007bff; border-radius: 50%; }
        .line-ols { width: 20px; height: 3px; background: #ffc107; stroke-dasharray: 3 3; }
        .line-mono { width: 20px; height: 3px; background: #28a745; }
        pre { background: #eee; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; max-height: 150px;}
    </style>
</head>
<body>

<div class="container">
    <h2>Точная монотонная аппроксимация</h2>
    <p style="font-size: 14px; color: #666;">
        Желтый пунктир — чистый OLS (идеально по точкам, но в конце у x=0.5 загибается вверх).<br>
        <b>Зеленая линия</b> — исправленный монотонный полином (идеально по точкам + строгое убывание).
    </p>
    
    <div class="legend">
        <div class="legend-item"><div class="dot-ref"></div> Точки (probe)</div>
        <div class="legend-item"><span style="border-bottom: 2px dashed #ffc107; width:20px; height:0; display:inline-block; margin-right:5px;"></span> Чистый OLS</div>
        <div class="legend-item"><span class="line-mono"></span> Монотонный OLS</div>
    </div>
    
    <svg id="plot" width="760" height="400"></svg>

    <h3>Итоговые коэффициенты K (Монотонные):</h3>
    <pre id="output-k"></pre>
</div>

<script type=module>

import {fitPolynomialOLS} from "./approximator2.js"


const 
Y = [ 13.172346322887492, 6.674610158729493, 3.577995761722919, 2.1780843163828855, 1.4272667544318528, 0.9874928977900401, 0.7147599296118747 ],
X = [ .20, .25, .30, .35, .40, .45, .50 ],
startX = X.at(0), endX = X.at(-1);




const K_ols = fitPolynomialOLS(X, Y, 5);
const K_mono = fitPolynomialOLS(X,Y,4);

document.getElementById('output-k').textContent = JSON.stringify(K_mono, null, 4);

const testPolyOls = poly(K_ols);
const testPolyMono = poly(K_mono);

// --- ШАГ 3: Отрисовка SVG ---
const svg = document.getElementById('plot');
const width = svg.clientWidth;
const height = svg.clientHeight;
const padding = 40;

const minX = 0.18, maxX = 0.52;
const minY = 0, maxY = 14;

const scaleX = x => padding + ((x - minX) / (maxX - minX)) * (width - 2 * padding);
const scaleY = y => height - padding - ((y - minY) / (maxY - minY)) * (height - 2 * padding);

// Сетка
svg.innerHTML += `<line x1="${scaleX(minX)}" y1="${scaleY(0)}" x2="${scaleX(maxX)}" y2="${scaleY(0)}" stroke="#999" stroke-width="1.5"/>`;
svg.innerHTML += `<line x1="${scaleX(startX)}" y1="${scaleY(minY)}" x2="${scaleX(startX)}" y2="${scaleY(maxY)}" stroke="#ccc" stroke-dasharray="4"/>`;
svg.innerHTML += `<line x1="${scaleX(endX)}" y1="${scaleY(minY)}" x2="${scaleX(endX)}" y2="${scaleY(maxY)}" stroke="#ccc" stroke-dasharray="4"/>`;

// Путь для чистого OLS (Желтый пунктир)
let pointsOls = [];
for (let px = padding; px <= width - padding; px+=10) {
    const x = minX + ((px - padding) / (width - 2 * padding)) * (maxX - minX);
    pointsOls.push(`${px},${scaleY(testPolyOls(x))}`);
}
svg.innerHTML += `<path d="M ${pointsOls.join(' L ')}" fill="none" stroke="#ffc107" stroke-width="2" stroke-dasharray="4 4" />`;

// Путь для Монотонного полинома (Зеленый)
let pointsMono = [];
for (let px = padding; px <= width - padding; px+=10) {
    const x = minX + ((px - padding) / (width - 2 * padding)) * (maxX - minX);
    pointsMono.push(`${px},${scaleY(testPolyMono(x))}`);
}
svg.innerHTML += `<path d="M ${pointsMono.join(' L ')}" fill="none" stroke="#28a745" stroke-width="2.5" />`;

// Отрисовка синих точек поверх линий

    svg.innerHTML += `<circle cx="${scaleX(x)}" cy="${scaleY(y)}" r="5" fill="#007bff" />`;
    svg.innerHTML += `<text x="${scaleX(x)}" y="${scaleY(y) - 12}" font-size="10" fill="#333" text-anchor="middle">${y.toFixed(2)}</text>`;
});
</script>

</body>
</html>
